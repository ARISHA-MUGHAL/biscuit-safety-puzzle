<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safety Biscuit Puzzle – World Safety Day 2026</title>

<style>

body{
font-family: "Segoe UI",sans-serif;
background: linear-gradient(135deg,#fff6e9,#f1e1c6);
margin:0;
text-align:center;
color:#5a3e1b;
}

header{
padding:20px;
background:#f3d7a6;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
margin:0;
font-size:28px;
}

#game-info{
display:flex;
justify-content:center;
gap:30px;
font-weight:bold;
margin-top:10px;
}

.board{
margin:30px auto;
max-width:700px;
}

.slots{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.slot{
width:60px;
height:60px;
border:2px dashed #a57c3c;
border-radius:10px;
}

.tiles{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.tile{
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
cursor:grab;
user-select:none;
box-shadow:0 6px 10px rgba(0,0,0,0.2);
transition:transform 0.2s;
}

.tile:active{
transform:scale(1.1);
cursor:grabbing;
}

.biscuit-square{
background:#c89b57;
border-radius:10px;
}

.biscuit-circle{
background:#e0b56e;
border-radius:50%;
}

.biscuit-rect{
background:#d2a35a;
border-radius:12px;
width:80px;
}

.biscuit-sandwich{
background:#f6e2a5;
border:4px solid #d8b565;
border-radius:14px;
}

.message{
margin-top:25px;
font-size:18px;
min-height:40px;
}

button{
background:#8c6239;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

.leaderboard{
margin-top:40px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #999;
padding:6px 12px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(600px) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<header>
<h1>🍪 Safety Biscuit Puzzle</h1>
<div>World Safety Day 2026 – Safe Minds Bake Safe Workplaces</div>

<div id="game-info">
<div>Puzzle: <span id="puzzleNum">1</span>/10</div>
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">0</span>s</div>
</div>
</header>

<div class="board">

<div class="slots" id="slots"></div>

<div class="tiles" id="tiles"></div>

<div class="message" id="message"></div>

<button id="nextBtn" style="display:none">Next Puzzle</button>

</div>

<div id="endScreen" style="display:none">

<h2>🎉 Congratulations!</h2>
<p>You completed the Recipe for Psychological Safety.</p>

<div id="finalStats"></div>

<input id="playerName" placeholder="Enter your name">

<button onclick="saveScore()">Save Score</button>

<div class="leaderboard">

<h3>🏆 Leaderboard</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Score</th>
<th>Time</th>
</tr>
</thead>

<tbody id="leaderboard"></tbody>

</table>

</div>

</div>

<script>

const puzzles=[
{word:"TRUST",msg:"Trust allows employees to speak up and report hazards without fear."},
{word:"CARE",msg:"When people care for each other, safety becomes shared responsibility."},
{word:"CALM",msg:"Calm thinking helps avoid mistakes during stressful work situations."},
{word:"TEAM",msg:"Strong teamwork creates safer workplaces."},
{word:"FOCUS",msg:"Focused workers notice hazards earlier."},
{word:"LISTEN",msg:"Listening improves communication and safety awareness."},
{word:"RESPECT",msg:"Respect builds psychological safety and open dialogue."},
{word:"SUPPORT",msg:"Supportive workplaces encourage reporting and learning."},
{word:"BALANCE",msg:"Balanced workloads reduce fatigue and accidents."},
{word:"SAFETY",msg:"Safety is the foundation of every successful workplace."}
]

let puzzleIndex=0
let score=0
let time=0

setInterval(()=>{
time++
document.getElementById("time").textContent=time
},1000)

function playTone(freq){
const ctx=new AudioContext()
const osc=ctx.createOscillator()
osc.frequency.value=freq
osc.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime+0.1)
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5)
}

function startPuzzle(){

document.getElementById("nextBtn").style.display="none"

const word=puzzles[puzzleIndex].word
const slots=document.getElementById("slots")
const tiles=document.getElementById("tiles")

slots.innerHTML=""
tiles.innerHTML=""

for(let i=0;i<word.length;i++){

const s=document.createElement("div")
s.className="slot"
s.dataset.index=i

s.ondrop=drop
s.ondragover=e=>e.preventDefault()

slots.appendChild(s)

}

shuffle(word.split("")).forEach(letter=>{

const t=document.createElement("div")

const styles=["biscuit-square","biscuit-circle","biscuit-rect","biscuit-sandwich"]

t.className="tile "+styles[Math.floor(Math.random()*styles.length)]

t.textContent=letter
t.draggable=true

t.ondragstart=e=>{
e.dataTransfer.setData("letter",letter)
e.dataTransfer.setData("id",Date.now())
t.dataset.id=e.dataTransfer.getData("id")
}

tiles.appendChild(t)

})

document.getElementById("puzzleNum").textContent=puzzleIndex+1

}

function drop(e){

e.preventDefault()

const letter=e.dataTransfer.getData("letter")

if(e.target.textContent===""){

e.target.textContent=letter
playTone(300)

check()

}

}

function check(){

const slots=document.querySelectorAll(".slot")

let attempt=""

slots.forEach(s=>attempt+=s.textContent)

if(attempt.length===puzzles[puzzleIndex].word.length){

if(attempt===puzzles[puzzleIndex].word){

score+=10
document.getElementById("score").textContent=score

document.getElementById("message").textContent=puzzles[puzzleIndex].msg

playTone(700)

confetti()

document.getElementById("nextBtn").style.display="inline"

}else{

playTone(150)

}

}

}

function confetti(){

for(let i=0;i<40;i++){

const c=document.createElement("div")
c.className="confetti"
c.style.left=Math.random()*100+"%"
c.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)]

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

document.getElementById("nextBtn").onclick=()=>{

puzzleIndex++

if(puzzleIndex>=puzzles.length){

endGame()

}else{

startPuzzle()

}

}

function endGame(){

document.querySelector(".board").style.display="none"

document.getElementById("endScreen").style.display="block"

document.getElementById("finalStats").innerHTML=

"Score: "+score+"<br>Time: "+time+"s"

}

function saveScore(){

const name=document.getElementById("playerName").value

let data=JSON.parse(localStorage.getItem("safetyGame")||"[]")

data.push({name,score,time})

data.sort((a,b)=>a.time-b.time)

data=data.slice(0,5)

localStorage.setItem("safetyGame",JSON.stringify(data))

loadLeaderboard()

}

function loadLeaderboard(){

const data=JSON.parse(localStorage.getItem("safetyGame")||"[]")

const table=document.getElementById("leaderboard")

table.innerHTML=""

data.forEach(d=>{

const row=document.createElement("tr")

row.innerHTML="<td>"+d.name+"</td><td>"+d.score+"</td><td>"+d.time+"</td>"

table.appendChild(row)

})

}

startPuzzle()
loadLeaderboard()

</script>

</body>
</html>
