<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EBM Safety Biscuit Puzzle</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
font-family:Arial;
background:#f6efe6;
text-align:center;
padding:20px;
}

h1{
color:#3c2b20;
}

#game{
max-width:500px;
margin:auto;
}

#tray{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin:20px 0;
}

.tile{
width:70px;
height:70px;
background:#d8a15e;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
font-weight:bold;
color:white;
cursor:pointer;
box-shadow:0 6px 10px rgba(0,0,0,0.2);
}

.slot{
width:70px;
height:70px;
border:2px dashed #caa37d;
border-radius:20px;
display:inline-flex;
align-items:center;
justify-content:center;
margin:5px;
}

#slots{
margin:15px 0;
}

button{
background:#b87333;
border:none;
padding:12px 20px;
color:white;
border-radius:30px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#info{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>🍪 EBM Safety Biscuit Puzzle</h1>

<div id="game">

<div id="info">
Puzzle: <span id="level">1</span>/10 |
Score: <span id="score">0</span> |
Time: <span id="time">0</span>s
</div>

<div id="slots"></div>

<div id="tray"></div>

<button onclick="checkWord()">Check</button>

<div id="message"></div>

</div>

<script>

const words=[
"TRUST",
"CALM",
"CARE",
"BALANCE",
"SUPPORT",
"RESPECT",
"SAFETY",
"FOCUS",
"TEAM",
"LISTEN"
]

let level=0
let score=0
let timer=0
let interval

function startTimer(){
interval=setInterval(()=>{
timer++
document.getElementById("time").innerText=timer
},1000)
}

function loadPuzzle(){

clearInterval(interval)
timer=0
document.getElementById("time").innerText=0
startTimer()

let word=words[level]

document.getElementById("level").innerText=level+1

let slotsHTML=""
for(let i=0;i<word.length;i++){
slotsHTML+=`<div class="slot" data-index="${i}"></div>`
}
document.getElementById("slots").innerHTML=slotsHTML

let shuffled=word.split("").sort(()=>Math.random()-0.5)

let trayHTML=""
shuffled.forEach(letter=>{
trayHTML+=`<div class="tile">${letter}</div>`
})

document.getElementById("tray").innerHTML=trayHTML

enableDrag()

}

function enableDrag(){

let tiles=document.querySelectorAll(".tile")
let slots=document.querySelectorAll(".slot")

tiles.forEach(tile=>{
tile.draggable=true

tile.addEventListener("dragstart",e=>{
e.dataTransfer.setData("text",tile.innerText)
tile.classList.add("dragging")
})

})

slots.forEach(slot=>{

slot.addEventListener("dragover",e=>{
e.preventDefault()
})

slot.addEventListener("drop",e=>{
e.preventDefault()
let letter=e.dataTransfer.getData("text")

if(slot.innerText===""){
slot.innerText=letter
}
})

})

}

function checkWord(){

let slots=document.querySelectorAll(".slot")

let word=""
slots.forEach(s=>{
word+=s.innerText
})

if(word===words[level]){

score+=10
document.getElementById("score").innerText=score

confetti({
particleCount:150,
spread:70,
origin:{y:0.6}
})

document.getElementById("message").innerText="Great! Correct word."

level++

if(level<words.length){
setTimeout(loadPuzzle,1200)
}else{
document.getElementById("message").innerText="🎉 You completed the Safety Recipe!"
}

}else{

document.getElementById("message").innerText="Try again."

}

}

loadPuzzle()

</script>

</body>
</html>
