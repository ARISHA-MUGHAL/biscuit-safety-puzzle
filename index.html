<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EBM Biscuit Safety Puzzle</title>

<style>

body{
font-family:Arial;
background:url("https://www.transparenttextures.com/patterns/food.png");
background-color:#f3eadf;
text-align:center;
padding:20px;
}

h1{
color:#3b2a1d;
}

#game{
max-width:600px;
margin:auto;
}

#tray{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin:25px 0;
}

.tile{

width:90px;
height:90px;

background-image:url("https://i.imgur.com/0T9QK0p.png");
background-size:cover;

border-radius:25px;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;
font-weight:bold;

color:white;

cursor:grab;

box-shadow:0 8px 12px rgba(0,0,0,0.25);

transition:transform .2s;

}

.tile:active{
transform:scale(1.1);
}

.slot{

width:90px;
height:90px;

border:3px dashed #c7a07a;

border-radius:25px;

display:inline-flex;

align-items:center;
justify-content:center;

margin:6px;

background:#fff7ef;

}

#slots{
margin:20px 0;
}

button{

background:#b87333;

border:none;

padding:12px 22px;

color:white;

border-radius:30px;

font-size:16px;

cursor:pointer;

}

#info{

margin-top:10px;

font-weight:bold;

font-size:18px;

}

#message{

margin-top:15px;

font-size:18px;

color:#3b2a1d;

}

</style>

</head>

<body>

<h1>🍪 EBM Safety Biscuit Puzzle</h1>

<div id="game">

<div id="info">

Puzzle: <span id="level">1</span>/5 |
Score: <span id="score">0</span> |
Total Time: <span id="time">0</span>s

</div>

<div id="slots"></div>

<div id="tray"></div>

<button onclick="checkWord()">Check</button>

<div id="message"></div>

</div>

<audio id="dropSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c3b9c8e6c.mp3">
</audio>

<script>

const puzzles=[
{word:"TRUST",msg:"Trust helps employees speak openly without fear."},

{word:"CARE",msg:"Care creates supportive and respectful workplaces."},

{word:"CALM",msg:"Calm environments reduce stress and improve focus."},

{word:"TEAM",msg:"Strong teams support each other's safety."},

{word:"FOCUS",msg:"Focus prevents mistakes and improves safety."}

]

let level=0
let score=0
let timer=0

setInterval(()=>{

timer++

document.getElementById("time").innerText=timer

},1000)

function loadPuzzle(){

let word=puzzles[level].word

document.getElementById("level").innerText=level+1

let slotsHTML=""

for(let i=0;i<word.length;i++){

slotsHTML+=`<div class="slot"></div>`

}

document.getElementById("slots").innerHTML=slotsHTML

let shuffled=word.split("").sort(()=>Math.random()-0.5)

let trayHTML=""

shuffled.forEach(letter=>{

trayHTML+=`<div class="tile">${letter}</div>`

})

document.getElementById("tray").innerHTML=trayHTML

enableDrag()

}

function enableDrag(){

let tiles=document.querySelectorAll(".tile")

let slots=document.querySelectorAll(".slot")

tiles.forEach(tile=>{

tile.draggable=true

tile.addEventListener("dragstart",e=>{

e.dataTransfer.setData("text",tile.innerText)

})

})

slots.forEach(slot=>{

slot.addEventListener("dragover",e=>{

e.preventDefault()

})

slot.addEventListener("drop",e=>{

e.preventDefault()

let letter=e.dataTransfer.getData("text")

if(slot.innerText===""){

slot.innerText=letter

document.getElementById("dropSound").play()

}

})

})

}

function checkWord(){

let slots=document.querySelectorAll(".slot")

let word=""

slots.forEach(s=>{

word+=s.innerText

})

if(word===puzzles[level].word){

score+=10

document.getElementById("score").innerText=score

document.getElementById("message").innerText=puzzles[level].msg

level++

if(level<puzzles.length){

setTimeout(loadPuzzle,1500)

}else{

document.getElementById("message").innerText="🎉 You completed the Safety Biscuit Recipe!"

}

}

else{

document.getElementById("message").innerText="Try again."

}

}

loadPuzzle()

</script>

</body>
</html>
