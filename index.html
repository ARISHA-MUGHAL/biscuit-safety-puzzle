<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safety Biscuit Puzzle - 2026 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7ede2;
            --primary-brown: #5d4037;
            --rio-top: #e3a857;
            --rio-dark: #3e2723; 
            --accent: #d84315;
            --shadow: rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d7ccc8 1px, transparent 1px);
            background-size: 25px 25px;
            color: var(--primary-brown);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px var(--shadow);
            z-index: 100;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #8d6e63; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-family: 'Fredoka One', cursive; color: var(--primary-brown); }

        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        h1 { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--primary-brown); margin-top: 10px; text-align: center; }

        #slot-container {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            min-height: 75px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        .slot {
            width: 65px;
            height: 65px;
            border: 3px dashed rgba(93, 64, 55, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.3);
        }

        #tile-area {
            flex: 1;
            width: 100%;
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }

        .biscuit {
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: rgba(62, 39, 35, 0.7);
            cursor: grab;
            position: absolute;
            user-select: none;
            background: var(--rio-top);
            border-radius: 10px;
            box-shadow: 0 4px 0 #c6934b, 0 6px 10px rgba(0,0,0,0.2);
            border: 1px solid #c6934b;
            z-index: 10;
        }

        .biscuit::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--rio-dark) 20%, transparent 25%);
            background-size: 18px 18px;
            background-position: 5px 5px;
            opacity: 0.3;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(62, 39, 35, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal {
            background: #fff;
            padding: 30px;
            border-radius: 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box"><div class="stat-label">Ingredient</div><div class="stat-value" id="puzzle-count">1/10</div></div>
        <div class="stat-box"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">Time</div><div class="stat-value" id="timer">0s</div></div>
        <button class="btn" style="margin:0; padding: 5px 12px;" onclick="loadPuzzle()">Reset</button>
    </div>

    <div id="game-container">
        <h1>Safe Minds Bake Safe Workplaces</h1>
        <div id="slot-container"></div>
        <div id="tile-area"></div>
    </div>

    <div id="start-overlay" class="overlay" style="display: flex;">
        <div class="modal">
            <h2>Welcome Baker!</h2>
            <p>Ready to bake psychological safety?</p>
            <button class="btn" onclick="startGame()">Start Baking</button>
        </div>
    </div>

    <div id="info-overlay" class="overlay">
        <div class="modal">
            <h2 id="info-title"></h2>
            <p id="info-text" style="margin: 15px 0;"></p>
            <button class="btn" onclick="nextPuzzle()">Next Ingredient</button>
        </div>
    </div>

    <script>
        const PUZZLES = [
            { word: "TRUST", info: "Trust allows employees to speak up and report hazards without fear." },
            { word: "CARE", info: "When people care, safety becomes a shared responsibility." },
            { word: "TEAM", info: "Strong teams support one another for a safer workplace." },
            { word: "FOCUS", info: "Concentration prevents accidental errors." }
        ];

        let currentIdx = 0;
        let score = 0;
        let startTime;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(freq, type, dur) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function startGame() {
            initAudio();
            document.getElementById('start-overlay').style.display = 'none';
            startTime = Date.now();
            setInterval(() => {
                document.getElementById('timer').innerText = Math.floor((Date.now()-startTime)/1000) + 's';
            }, 1000);
            loadPuzzle();
        }

        function loadPuzzle() {
            const p = PUZZLES[currentIdx];
            document.getElementById('puzzle-count').innerText = `${currentIdx + 1}/${PUZZLES.length}`;
            const sCont = document.getElementById('slot-container');
            const tArea = document.getElementById('tile-area');
            sCont.innerHTML = '';
            tArea.innerHTML = '';

            // Create Slots
            p.word.split('').forEach((_, i) => {
                const s = document.createElement('div');
                s.className = 'slot';
                s.dataset.index = i;
                sCont.appendChild(s);
            });

            // Create Biscuits in a Neat Grid (No Overlap)
            const letters = p.word.split('').sort(() => Math.random() - 0.5);
            const cols = 3;
            const gap = 80;
            
            letters.forEach((char, i) => {
                const t = document.createElement('div');
                t.className = 'biscuit';
                t.innerText = char;
                t.dataset.letter = char;
                
                // Position in grid
                const r = Math.floor(i / cols);
                const c = i % cols;
                t.style.left = (20 + (c * gap)) + 'px';
                t.style.top = (20 + (r * gap)) + 'px';
                
                attachDrag(t);
                tArea.appendChild(t);
            });
        }

        function attachDrag(el) {
            let offsetX, offsetY;

            const move = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                el.style.left = (clientX - offsetX) + 'px';
                el.style.top = (clientY - offsetY) + 'px';
            };

            const stop = (e) => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('touchmove', move);
                
                const slots = document.querySelectorAll('.slot');
                let snapped = false;

                slots.forEach(slot => {
                    const sRect = slot.getBoundingClientRect();
                    const tRect = el.getBoundingClientRect();
                    
                    // Check if biscuit center is over slot
                    const tCenterX = tRect.left + tRect.width/2;
                    const tCenterY = tRect.top + tRect.height/2;

                    if (tCenterX > sRect.left && tCenterX < sRect.right && 
                        tCenterY > sRect.top && tCenterY < sRect.bottom) {
                        
                        // SNAP TO CENTER
                        const areaRect = document.getElementById('tile-area').getBoundingClientRect();
                        el.style.left = (sRect.left - areaRect.left) + 'px';
                        el.style.top = (sRect.top - areaRect.top) + 'px';
                        el.dataset.slotIdx = slot.dataset.index;
                        snapped = true;
                        playSound(400, 'sine', 0.1); // Drop Sound
                    }
                });

                if(!snapped) el.dataset.slotIdx = -1;
                checkWord();
            };

            const start = (e) => {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = el.getBoundingClientRect();
                offsetX = clientX - rect.left;
                offsetY = clientY - rect.top;
                el.style.zIndex = 1000;
                document.addEventListener('mousemove', move);
                document.addEventListener('touchmove', move, {passive: false});
                document.addEventListener('mouseup', stop);
                document.addEventListener('touchend', stop);
            };

            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start);
        }

        function checkWord() {
            const word = PUZZLES[currentIdx].word;
            const tiles = document.querySelectorAll('.biscuit');
            let currentStr = new Array(word.length).fill('_');

            tiles.forEach(t => {
                const idx = parseInt(t.dataset.slotIdx);
                if(idx >= 0) currentStr[idx] = t.dataset.letter;
            });

            if(currentStr.join('') === word) {
                playSound(600, 'triangle', 0.3); // Win Sound
                setTimeout(() => {
                    const p = PUZZLES[currentIdx];
                    document.getElementById('info-title').innerText = p.word;
                    document.getElementById('info-text').innerText = p.info;
                    document.getElementById('info-overlay').style.display = 'flex';
                }, 400);
            }
        }

        function nextPuzzle() {
            document.getElementById('info-overlay').style.display = 'none';
            currentIdx++;
            if(currentIdx < PUZZLES.length) loadPuzzle();
            else alert("Campaign Complete! You are a Safety Master!");
        }
    </script>
</body>
</html>
